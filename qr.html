<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1d7f62" />
    <title>QRコード | 文化祭AIコンシェルジュ</title>
    <link rel="icon" href="/assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/src/styles.css" />
    <style>
      .qr-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(18px, 4vw, 40px);
      }

      .qr-shell {
        width: min(560px, 100%);
        display: grid;
        gap: 18px;
      }

      .qr-card {
        display: grid;
        gap: 18px;
        padding: clamp(18px, 4vw, 28px);
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .qr-frame {
        display: grid;
        place-items: center;
        padding: 18px;
        background: white;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .qr-frame img {
        width: min(320px, 100%);
        aspect-ratio: 1;
        image-rendering: pixelated;
      }

      .qr-actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .qr-link {
        color: var(--blue);
        overflow-wrap: anywhere;
        font-weight: 800;
      }

      @media (max-width: 560px) {
        .qr-actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="qr-page">
      <section class="qr-shell">
        <div class="qr-card">
          <div>
            <p class="eyebrow">スマホ確認</p>
            <h1>QRコード</h1>
          </div>
          <p class="route-summary">公開URLをスマホで開くためのQRコードです。Vercelにデプロイ後、このページをPCで開いて読み取れます。</p>
          <label class="select-field">
            <span>公開URL</span>
            <input id="target-url" type="url" autocomplete="url" />
          </label>
          <div class="qr-frame">
            <img id="qr-image" alt="公開URLのQRコード" />
          </div>
          <div class="qr-actions">
            <a class="qr-link" id="target-link" href="/"></a>
            <button class="ghost-button" id="copy-url" type="button">URLをコピー</button>
          </div>
        </div>
      </section>
    </main>

    <script>
      const input = document.querySelector("#target-url");
      const image = document.querySelector("#qr-image");
      const link = document.querySelector("#target-link");
      const copy = document.querySelector("#copy-url");
      const params = new URLSearchParams(window.location.search);
      const inferredUrl = window.location.protocol === "file:"
        ? "https://your-project.vercel.app/"
        : new URL("/", window.location.href).href;

      input.value = params.get("url") || params.get("u") || inferredUrl;

      function updateQr() {
        const target = input.value.trim() || inferredUrl;
        const encoded = encodeURIComponent(target);
        image.src = `https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=18&data=${encoded}`;
        link.href = target;
        link.textContent = target;
      }

      input.addEventListener("input", updateQr);
      copy.addEventListener("click", async () => {
        const target = input.value.trim();
        if (navigator.clipboard) {
          await navigator.clipboard.writeText(target);
          copy.textContent = "コピー済み";
        } else {
          input.select();
          copy.textContent = "選択しました";
        }
        window.setTimeout(() => {
          copy.textContent = "URLをコピー";
        }, 1400);
      });

      updateQr();
    </script>
  </body>
</html>
